name: CodeQL

# Static Application Security Testing (SAST) for the H0 Archon app.
# Scans the JavaScript/TypeScript sources (app/, lib/, middleware, auth) with
# GitHub's CodeQL engine using the security-and-quality query suite.
#
# Runs on:
#   - every push to master/main,
#   - every pull request, and
#   - a weekly schedule (so newly published queries catch latent issues).
#
# build-mode: none — JS/TS is interpreted, so CodeQL extracts directly from
# source. No npm install / build step is required (and none is run here).

on:
  push:
    branches:
      - main
      - master
  pull_request:
  schedule:
    # Mondays 04:17 UTC — off-peak, avoids the top-of-hour scheduling stampede.
    - cron: "17 4 * * 1"

# CodeQL needs security-events:write to upload its SARIF results to the
# repository's Security > Code scanning tab.
permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
